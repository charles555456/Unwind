<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SVG Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
<style>
  body { display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; background:#fff; }
  svg { width: 380px; height: auto; }
</style>
</head>
<body>
  <svg viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- tangled scribble ball -->
    <path d="M50 48c-10-16 8-28 20-16s-8 26-18 12c12-6 24 12 12 26s-24-6-12-20" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
    <path d="M40 42c18-10-5-26 14-12s6 32-12 18c18 6-6 26-14 12s6-26 12-18" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
    <path d="M56 38c-16 6 1 32 12 18s-12-26 6-32c-6 18 18 6 12 26s-24 0-6-12" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
    <path d="M44 56c6-26 18 2 24-12s-18 18-6 24c-12-6 2-26 12-18s-6 18-12 6" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
    <path d="M36 48c16-16 3-28 22-14s-10 28-16 14c10 10 22-3 16 16s-22-5-10-16" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
    <path d="M48 38c-8 16 16 22 10 3s-16 10 3 22c6-12-10-22 10-16s-16 10-3-8" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
    <path d="M54 60c-16-8 3-30-10-18s18 24 3 32c10-18-10-10 14-24s-12 18-8 10" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>

    <!-- connecting line from ball to text -->
    <path d="M72 54 C82 58, 92 60, 102 58 C110 55, 116 52, 124 52" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- cursive charlesshen -->
    <text x="120" y="62" font-family="'Mrs Saint Delafield', cursive" font-size="40" fill="#1a1a1a">charlesshen</text>

    <!-- trailing line from text to end circle -->
    <path d="M248 56 C265 54, 285 52, 310 52 L360 52" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- small circle at the end -->
    <circle cx="366" cy="52" r="3.5" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  </svg>
</body>
</html>
